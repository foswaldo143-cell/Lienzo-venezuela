<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>Red Lienzo — Bienvenido</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="franja-superior"></div>
<main class="pantalla">
  <div class="contenedor">
    <div class="encabezado-marca">
      <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Logo Red Lienzo">
        <circle cx="50" cy="50" r="48" fill="#1b3a5c"/>
        <path d="M50 18 C 33 18, 20 31, 20 47 C 20 62, 33 74, 48 80 C 49 80.5, 51 80.5, 52 80 C 67 74, 80 62, 80 47 C 80 31, 67 18, 50 18 Z"
              fill="none" stroke="#ffffff" stroke-width="3.2"/>
        <circle cx="40" cy="46" r="6.5" fill="#c1672b"/>
        <circle cx="60" cy="46" r="6.5" fill="#ffffff"/>
        <path d="M30 58 C 38 66, 62 66, 70 58" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round"/>
      </svg>
      <h1>Red Lienzo</h1>
    </div>
    <div class="tarjeta" style="text-align:center;">
      <h2 style="color:var(--azul-profundo); font-size: var(--texto-xl);">Bienvenido</h2>
      <p style="color:var(--texto-secundario); font-size: var(--texto-lg);">
        Esta sección está en construcción. Muy pronto podrás ver aquí el estado de tu solicitud
        y, si eres aprobado, la información de tu centro de cuidado asignado.
      </p>
    </div>
  </div>
</main>
</body>
</html>

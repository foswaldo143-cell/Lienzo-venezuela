<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>Red Lienzo — Iniciar sesión</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="franja-superior"></div>
<main class="pantalla">
  <div class="contenedor">

    <div class="encabezado-marca">
      <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Logo Red Lienzo">
        <circle cx="50" cy="50" r="48" fill="#1b3a5c"/>
        <path d="M50 18 C 33 18, 20 31, 20 47 C 20 62, 33 74, 48 80 C 49 80.5, 51 80.5, 52 80 C 67 74, 80 62, 80 47 C 80 31, 67 18, 50 18 Z"
              fill="none" stroke="#ffffff" stroke-width="3.2"/>
        <circle cx="40" cy="46" r="6.5" fill="#c1672b"/>
        <circle cx="60" cy="46" r="6.5" fill="#ffffff"/>
        <path d="M30 58 C 38 66, 62 66, 70 58" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round"/>
      </svg>
      <h1>Red Lienzo</h1>
      <p class="subtitulo">Apoyo a Centros de Cuidado</p>
    </div>

    <div class="tarjeta">
      <div id="mensaje-error" class="mensaje mensaje-error" role="alert"></div>

      <form id="form-login" novalidate>
        <div class="campo">
          <label for="cedula-numero">Cédula</label>
          <div class="fila-cedula">
            <select id="cedula-tipo" aria-label="Tipo de cédula">
              <option value="V">V</option>
              <option value="E">E</option>
            </select>
            <input type="text" id="cedula-numero" name="cedula-numero" inputmode="numeric"
                   placeholder="12345678" autocomplete="username" required>
          </div>
          <p class="ayuda-campo">Solo números, sin puntos ni guiones.</p>
        </div>

        <div class="campo">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>

        <button type="submit" class="boton-primario" id="btn-login">
          <span id="texto-btn-login">Iniciar sesión</span>
        </button>
      </form>
    </div>

    <div class="pie-secundario">
      <p>¿No tienes cuenta?</p>
      <a class="boton boton-secundario" href="registro.html">Crear una cuenta</a>
    </div>

  </div>
</main>

<script src="js/firebase-config.js"></script>
<script type="module" src="js/login.js"></script>
</body>
</html>
